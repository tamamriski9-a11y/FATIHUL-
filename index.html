<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Data Diriku</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #d8b4f8, #fbcfe8);
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            max-width: 800px;
            margin: auto;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            border: 5px solid #c084fc;
        }

        h1 {
            text-align: center;
            color: #7e22ce;
            font-size: 40px;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 30px;
            color: #444;
        }

        .field {
            margin-bottom: 20px;
        }

        .label {
            display: inline-block;
            background: #c084fc;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
        }

        .box {
            margin-top: 8px;
            border: 3px solid #c084fc;
            border-radius: 15px;
            padding: 15px;
            font-size: 18px;
            color: #444;
        }

        .photo {
            text-align: center;
            margin: 30px 0;
        }

        .photo img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border: 5px solid #c084fc;
            border-radius: 20px; /* kotak estetik */
        }

        .ig {
            text-transform: none;
        }

        a {
            color: #ec4899;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>DATA DIRIKU</h1>
    <p class="subtitle">Kenalan yuk! Biar makin kenal 😊</p>

    <div class="photo">
        <img src="foto-profil.jpg" alt="Foto Profil">
    </div>

    <div class="field">
        <div class="label">Nama Lengkap</div>
        <div class="box">FATIHUL BARIZAH</div>
    </div>

    <div class="field">
        <div class="label">Kelas</div>
        <div class="box">XII TJKT 1</div>
    </div>

    <div class="field">
        <div class="label">Hobi</div>
        <div class="box">MEMBACA</div>
    </div>

    <div class="field">
        <div class="label">Cita-cita</div>
        <div class="box">PENGUSAHA</div>
    </div>

    <div class="field">
        <div class="label ig">Instagram</div>
        <div class="box">
            <a href="https://instagram.com/zaa_zyyaa" target="_blank">@zaa_zyyaa</a>
        </div>
    </div>

</div>

</body>
</html>
