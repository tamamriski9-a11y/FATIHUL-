<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Profil Saya</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #d8b4f8, #fbcfe8);
            margin: 0;
        }
        .card {
            background: white;
            width: 100%;
            height: 100vh; /* full layar */
            padding: 40px 20px;
            box-sizing: border-box;
            text-align: center;
            border-radius: 0; /* hilangkan sudut biar full */
            box-shadow: none;
            display: flex;
            flex-direction: column;
            justify-content: center; /* tengah vertikal */
            align-items: center; /* tengah horizontal */
        }
        img {
            width: 250px; /* lebih besar */
            height: 250px;
            border-radius: 50%;
            object-fit: cover;
            border: 6px solid #c084fc;
            margin-bottom: 20px;
        }
        h2 {
            margin: 15px 0;
            color: #7e22ce;
            font-size: 30px;
        }
        p {
            margin: 10px 0;
            color: #444;
            font-size: 20px;
        }
        strong {
            color: #a21caf;
            font-size: 21px;
        }
        a {
            color: #ec4899;
            text-decoration: none;
            font-weight: bold;
            font-size: 20px;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="foto-profil.jpg" alt="Foto Profil">
    <h2>Fatihul Barizah</h2>
    <p><strong>Kelas:</strong> XII TJKT 1</p>
    <p><strong>Hobi:</strong> Membaca</p>
    <p><strong>Cita-cita:</strong> Pengusaha</p>
    <p><strong>Instagram:</strong><br>
        <a href="https://instagram.com/zaa_zyyaa" target="_blank">@zaa_zyyaa</a>
    </p>
</div>

</body>
</html>
