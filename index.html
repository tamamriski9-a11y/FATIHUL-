<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Profil Saya</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #d8b4f8, #fbcfe8);
            text-align: center;
        }
        .card {
            background: white;
            padding: 25px;
            margin: 50px auto;
            width: 350px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
        img {
            width: 150px; /* diperbesar */
            height: 150px;
            border-radius: 50%; /* tetap bulat */
            object-fit: cover; /* biar tidak gepeng */
            border: 4px solid #c084fc;
        }
        h2 {
            margin: 15px 0;
            color: #7e22ce;
            font-size: 24px; /* diperbesar */
        }
        p {
            margin: 8px 0;
            color: #444;
            font-size: 16px; /* diperbesar */
        }
        strong {
            color: #a21caf;
            font-size: 17px;
        }
        a {
            color: #ec4899;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="foto-profil.jpg" alt="Foto Profil">
    <h2>Fatihul Barizah</h2>
    <p><strong>Kelas:</strong> XII TJKT 1</p>
    <p><strong>Hobi:</strong> Membaca</p>
    <p><strong>Cita-cita:</strong> Pengusaha</p>
    <p><strong>Instagram:</strong><br>
        <a href="https://instagram.com/zaa_zyyaa" target="_blank">@zaa_zyyaa</a>
    </p>
</div>

</body>
</html>
