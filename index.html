<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Profil Saya</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #d8b4f8, #fbcfe8);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            width: 80%;
            max-width: 800px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 5px solid #c084fc;
            overflow: hidden;
            text-align: center;
        }

        .header {
            background: linear-gradient(135deg, #c084fc, #f472b6);
            padding: 40px 20px;
        }

        .header img {
            width: 180px;
            height: 180px;
            border-radius: 0; /* kotak */
            object-fit: cover;
            border: 5px solid white;
        }

        .content {
            padding: 30px;
        }

        h2 {
            margin: 10px 0;
            color: #7e22ce;
            font-size: 30px;
            text-transform: uppercase;
        }

        p {
            margin: 10px 0;
            font-size: 20px;
            color: #444;
            text-transform: uppercase;
        }

        strong {
            color: #a21caf;
        }

        .ig {
            text-transform: none;
        }

        a {
            color: #ec4899;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <img src="foto-profil.jpg" alt="Foto Profil">
    </div>

    <div class="content">
        <h2>Fatihul Barizah</h2>
        <p><strong>Kelas:</strong> XII TJKT 1</p>
        <p><strong>Hobi:</strong> Membaca</p>
        <p><strong>Cita-cita:</strong> Pengusaha</p>
        <p class="ig"><strong>Instagram:</strong><br>
            <a href="https://instagram.com/zaa_zyyaa" target="_blank">@zaa_zyyaa</a>
        </p>
    </div>
</div>

</body>
</html>
