<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Profil Saya</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #d8b4f8, #fbcfe8);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 50px;
            width: 70%; /* diperbesar lagi */
            max-width: 700px;
            border-radius: 25px;
            box-shadow: 0 0 25px rgba(0,0,0,0.2);
            border: 5px solid #c084fc;
            text-align: center;
        }
        img {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            object-fit: cover;
            border: 6px solid #c084fc;
            margin-bottom: 15px;
        }
        h2 {
            margin: 15px 0;
            color: #7e22ce;
            font-size: 32px;
            text-transform: uppercase;
        }
        p {
            margin: 12px 0;
            color: #444;
            font-size: 20px;
            text-transform: uppercase;
        }
        strong {
            color: #a21caf;
            font-size: 21px;
        }
        .ig-label {
            text-transform: none; /* biar "Instagram" tidak kapital semua */
        }
        a {
            color: #ec4899;
            text-decoration: none;
            font-weight: bold;
            font-size: 20px;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="foto-profil.jpg" alt="Foto Profil">
    <h2>Fatihul Barizah</h2>
    <p><strong>Kelas:</strong> XII TJKT 1</p>
    <p><strong>Hobi:</strong> Membaca</p>
    <p><strong>Cita-cita:</strong> Pengusaha</p>
    <p class="ig-label"><strong>Instagram:</strong><br>
        <a href="https://instagram.com/zaa_zyyaa" target="_blank">@zaa_zyyaa</a>
    </p>
</div>

</body>
</html>
