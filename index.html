<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Profil Saya</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #d8b4f8, #fbcfe8);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* full layar */
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            width: 90%; /* hampir full layar */
            max-width: 500px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }
        img {
            width: 200px; /* diperbesar lagi */
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #c084fc;
            margin-bottom: 10px;
        }
        h2 {
            margin: 15px 0;
            color: #7e22ce;
            font-size: 28px;
        }
        p {
            margin: 10px 0;
            color: #444;
            font-size: 18px;
        }
        strong {
            color: #a21caf;
            font-size: 19px;
        }
        a {
            color: #ec4899;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="foto-profil.jpg" alt="Foto Profil">
    <h2>Fatihul Barizah</h2>
    <p><strong>Kelas:</strong> XII TJKT 1</p>
    <p><strong>Hobi:</strong> Membaca</p>
    <p><strong>Cita-cita:</strong> Pengusaha</p>
    <p><strong>Instagram:</strong><br>
        <a href="https://instagram.com/zaa_zyyaa" target="_blank">@zaa_zyyaa</a>
    </p>
</div>

</body>
</html>
